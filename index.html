/* ── Firebase REST API (SDK 없이 fetch만 사용) ── */
const FB_URL='https://slow-letter-c6284-default-rtdb.firebaseio.com';

function genShortId(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  let id='';
  for(let i=0;i<10;i++) id+=chars[Math.floor(Math.random()*chars.length)];
  return id;
}

async function pushToFirebase(obj){
  const id=genShortId();
  let res;
  try{
    res=await fetch(FB_URL+'/letters/'+id+'.json',{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({data:JSON.stringify(obj),createdAt:Date.now()})
    });
  }catch(fetchErr){
    throw new Error('fetch failed: '+fetchErr.message);
  }
  if(!res.ok){
    const txt=await res.text().catch(()=>'');
    throw new Error('HTTP '+res.status+': '+txt.slice(0,80));
  }
  return id;
}

async function fetchFromFirebase(id){
  const res=await fetch(FB_URL+'/letters/'+id+'.json');
  if(!res.ok) return null;
  const val=await res.json();
  if(!val||!val.data) return null;
  return JSON.parse(val.data);
}

/* ══════════ TIMER & TOKEN LOGIC ══════════ */

/*
  G.timerStart  : timestamp — set when user first unlocks a question in a received letter
  G.writeTokens : accumulated write tokens (answer a question)
  G.readTokens  : accumulated read tokens (read a reply)

  Every 24h since timerStart, +1 to each pool.
  Tokens are consumed on use and never go below 0.
  First Mail exception: write tokens NOT consumed (FM is free).
  Reading replies from FM still consumes read tokens.
*/

function syncTokens(){
  if(!G.timerStart) return;
  const now=Date.now();
  const elapsed=now-G.timerStart;
  /* total cycles that have completed since timer start */
  const totalCycles=Math.floor(elapsed/WAIT);
  /* cycles already accounted for = total tokens ever granted - current held tokens
     We track this via G.cyclesGranted */
  if(G.cyclesGranted===undefined) G.cyclesGranted=0;
  const newCycles=totalCycles-G.cyclesGranted;
  if(newCycles>0){
    G.writeTokens+=newCycles;
    G.readTokens+=newCycles;
    G.cyclesGranted+=newCycles;
    lsSave();
  }
}

function msUntilNextToken(){
  if(!G.timerStart) return null;
  const elapsed=Date.now()-G.timerStart;
  const nextCycle=(Math.floor(elapsed/WAIT)+1)*WAIT;
  return nextCycle-elapsed;
}

function dayNumber(){
  if(!G.timerStart) return 0;
  return Math.floor((Date.now()-G.timerStart)/WAIT)+1;
}

function startTimerIfNeeded(){
  if(!G.timerStart){
    G.timerStart=Date.now();
    /* grant first token immediately on day 1 */
    G.writeTokens=1;
    G.readTokens=1;
    G.cyclesGranted=1;
    lsSave();
  }
}

/* ── Unlock question (consumes writeToken, except FM) ── */
function doUnlock(lIdx,qIdx){
  syncTokens();
  const ls=[...S.letters.received];
  const l={...ls[lIdx],questions:ls[lIdx].questions.map(q=>({...q}))};
  const fm=isFM(l.title);

  if(!fm){
    if(G.writeTokens<1){showToast(t('noToken_w'));return;}
    G.writeTokens--;
    lsSave();
  }

  l.questions[qIdx].unlockedAt=Date.now();
  ls[lIdx]=l;
  S.letters={...S.letters,received:ls};
  lsSave();render();
}

/* ── Read reply (consumes readToken) ── */
function doReadReply(lIdx,qIdx){
  syncTokens();
  if(G.readTokens<1){showToast(t('noToken_r'));return;}
  G.readTokens--;

  const ls=[...S.letters.sent];
  const l={...ls[lIdx],questions:ls[lIdx].questions.map(q=>({...q}))};
  l.questions[qIdx].replyReadAt=Date.now();
  ls[lIdx]=l;
  S.letters={...S.letters,sent:ls};
  lsSave();render();
}

/* ── Save answer text ── */
function saveAnswer(lIdx,qIdx,text){
  const ls=[...S.letters.received];
  const l={...ls[lIdx],questions:ls[lIdx].questions.map(q=>({...q}))};
  l.questions[qIdx].answer=text;
  ls[lIdx]=l;
  S.letters={...S.letters,received:ls};lsSave();
}

/* ══════════ ARC WIDGET ══════════ */
function fmt(ms){
  if(ms<=0)return'00:00:00';
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return[h,m,sc].map(v=>String(v).padStart(2,'0')).join(':');
}

function drawArc(){
  syncTokens();
  const svg=document.getElementById('arc-svg');
  if(!svg) return;

  const ms=msUntilNextToken();
  const hasTokens=(G.writeTokens>0||G.readTokens>0);
  let pct=1;
  if(ms!==null) pct=1-(ms/WAIT);

  /* viewBox "0 0 240 100", cy=100 → 반원 바닥이 캔버스 정확히 하단 */
  const cx=120, cy=100, R=90, tr=97;
  const da=Math.PI-pct*Math.PI;
  const dx=(cx+R*Math.cos(da)).toFixed(1);
  const dy=(cy-R*Math.sin(da)).toFixed(1);
  let tks='';
  for(let i=0;i<=28;i++){
    const a=Math.PI-(i/28)*Math.PI, ln=i%7===0?8:4;
    const ix=(cx+tr*Math.cos(a)).toFixed(1), iy=(cy-tr*Math.sin(a)).toFixed(1);
    const ox=(cx+(tr+ln)*Math.cos(a)).toFixed(1), oy=(cy-(tr+ln)*Math.sin(a)).toFixed(1);
    tks+=`<line x1="${ix}" y1="${iy}" x2="${ox}" y2="${oy}" stroke="#ddd" stroke-width="1"/>`;
  }
  svg.setAttribute('viewBox','0 0 240 100');
  svg.innerHTML=`${tks}
    <path d="M${cx-R} ${cy} A${R} ${R} 0 0 1 ${cx+R} ${cy}" fill="none" stroke="#ebebeb" stroke-width="1"/>
    <circle cx="${dx}" cy="${dy}" r="5.5" fill="${AC}" opacity="${G.timerStart?1:0.25}"/>`;

  /* DOM 텍스트 업데이트 */
  const tel=document.getElementById('arc-t');
  const dayEl=document.getElementById('arc-day');
  const timeStr=ms!==null?fmt(ms):'— : — : —';
  if(tel){
    tel.textContent=timeStr;
    tel.className='arct'+(hasTokens?' hastoken':'');
  }
  if(dayEl){
    if(G.timerStart){
      dayEl.textContent=String(dayNumber());
      dayEl.style.display='block';
    } else {
      dayEl.style.display='none';
    }
  }
}

function arcWidget(){
  syncTokens();
  const hasTokens=(G.writeTokens>0||G.readTokens>0);
  const wColor=G.writeTokens>0?'hi':'';
  const rColor=G.readTokens>0?'hi':'';

  if(!G.timerStart){
    return`<div class="arcw">
      <div class="arc-notstarted">${t('notStarted')}</div>
    </div>`;
  }

  return`<div class="arcw">
    <svg id="arc-svg" viewBox="0 0 240 100"></svg>
    <div id="arc-day" class="arc-day" style="display:none;"></div>
    <div id="arc-t" class="arct">— : — : —</div>
    <div class="arc-tokens">
      <div class="arc-token-row">${tc('tokenWrite','')} <span class="${wColor}">${G.writeTokens}</span></div>
      <div class="arc-token-row">${tc('tokenRead','')} <span class="${rColor}">${G.readTokens}</span></div>
    </div>
  </div>`;
}

/* ── 코드 압축: 필드 단축 + DeflateRaw(브라우저 내장) ── */
function deflate(obj){
  const qs=(obj.questions||[]).map(q=>({
    t:q.text,
    ...(q.answer?{a:q.answer}:{}),
    ...(q.isLetter?{l:1}:{})
  }));
  return {i:obj.id,ti:obj.title,q:qs,c:obj.createdAt,tp:obj.type||'q'};
}
function inflate(obj){
  if(obj.questions) return obj;
  return {
    id:obj.i,title:obj.ti,createdAt:obj.c,type:obj.tp||'q',
    questions:(obj.q||[]).map(q=>({
      text:q.t,answer:q.a||'',unlockedAt:null,replyReadAt:null,
      ...(q.l?{isLetter:true}:{})
    }))
  };
}
const B85C='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!#$%&()*+-;<=>?@^_`{|}~';
function b85enc(buf){
  let r='',i=0;
  while(i<buf.length){
    let v=0,chunk=Math.min(4,buf.length-i);
    for(let j=0;j<4;j++) v=v*256+(j<chunk?buf[i+j]:0);
    let s='';
    for(let j=0;j<5;j++){s=B85C[v%85]+s;v=Math.floor(v/85);}
    r+=s.slice(0,chunk+1);
    i+=4;
  }
  return r;
}
function b85dec(str){
  const out=[];
  let i=0;
  while(i<str.length){
    const chunk=Math.min(5,str.length-i);
    let v=0;
    for(let j=0;j<5;j++) v=v*85+(j<chunk?B85C.indexOf(str[i+j]):84);
    const bytes=chunk-1;
    for(let j=3;j>=4-bytes;j--) out.push((v>>(j*8))&0xff);
    i+=5;
  }
  return new Uint8Array(out);
}
async function compress(str){
  const enc=new TextEncoder().encode(str);
  const cs=new CompressionStream('deflate-raw');
  const w=cs.writable.getWriter();
  w.write(enc);w.close();
  const chunks=[];
  const reader=cs.readable.getReader();
  while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
  const buf=new Uint8Array(chunks.reduce((a,b)=>a+b.length,0));
  let off=0;for(const ch of chunks){buf.set(ch,off);off+=ch.length;}
  return b85enc(buf);
}
async function decompress(code){
  const b64=code.replace(/-/g,'+').replace(/_/g,'/');
  const bin=atob(b64);
  const buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('deflate-raw');
  const w=ds.writable.getWriter();
  w.write(buf);w.close();
  const chunks=[];
  const reader=ds.readable.getReader();
  while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
  return new TextDecoder().decode(new Uint8Array(chunks.reduce((a,b)=>a+b.length,0)).fill(0).map((_,i)=>{
    let off=0;for(const ch of chunks){if(i<off+ch.length)return ch[i-off];off+=ch.length;}return 0;
  }));
}
async function decompressFull(code){
  let buf;
  /* b85: 첫 문자가 B85C에 있고 base64 문자가 아닌 경우 */
  const isB85=B85C.includes(code[0])&&!/^[A-Za-z0-9+/=_-]+$/.test(code)||code.includes('!');
  if(isB85){
    buf=b85dec(code);
  } else {
    const b64=code.replace(/-/g,'+').replace(/_/g,'/');
    const bin=atob(b64);
    buf=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  }
  const ds=new DecompressionStream('deflate-raw');
  const w=ds.writable.getWriter();w.write(buf);w.close();
  const parts=[];
  const reader=ds.readable.getReader();
  while(true){const{done,value}=await reader.read();if(done)break;parts.push(value);}
  const total=parts.reduce((s,p)=>s+p.length,0);
  const out=new Uint8Array(total);
  let o=0;for(const p of parts){out.set(p,o);o+=p.length;}
  return new TextDecoder().decode(out);
}
async function copyCode(obj){
  showToast('...');
  try{
    const id=await pushToFirebase(deflate(obj));
    /* iOS Safari: async 후 clipboard 차단 → prompt로 표시 */
    const copied=await tryClipboard(id);
    if(copied){
      showToast(t('copied'));
    } else {
      prompt(lang==='kr'?'코드를 복사하세요:':lang==='jp'?'コードをコピーしてください:':'Copy this code:', id);
      showToast(t('copied'));
    }
  }catch(e){
    showToast('ERR: '+e.message);
  }
}
async function tryClipboard(text){
  try{
    if(navigator.clipboard&&window.isSecureContext){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){}
  /* execCommand fallback */
  try{
    const el=document.createElement('textarea');
    el.value=text;
    el.style.cssText='position:fixed;top:0;left:0;opacity:0.01;font-size:16px;';
    document.body.appendChild(el);
    el.focus();el.select();
    const ok=document.execCommand('copy');
    document.body.removeChild(el);
    if(ok) return true;
  }catch(e){}
  return false;
}
function fallbackCopy(text){
  const el=document.createElement('textarea');
  el.value=text;el.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(el);el.focus();el.select();
  try{document.execCommand('copy');showToast(t('copied'));}
  catch(e){prompt('코드를 복사하세요:',text);}
  document.body.removeChild(el);
}
async function doImport(){
  const raw=document.getElementById('imp-in')?.value||'';
  const raw2=raw.trim();
  if(!raw2){showToast(t('invalid'));return;}
  try{
    let parsed;
    /* 10자리 단축코드 → Firebase 조회 */
    if(/^[A-Za-z2-9]{10}$/.test(raw2)){
      const fbData=await fetchFromFirebase(raw2);
      if(!fbData){showToast(t('invalid'));return;}
      parsed=fbData;
    } else {
      /* 기존 긴 코드 방식 */
      try{
        const jsonStr=await decompressFull(raw2);
        parsed=JSON.parse(jsonStr);
      }catch(e2){
        parsed=JSON.parse(decodeURIComponent(atob(raw2)));
      }
    }
    const dec=inflate(parsed);
    const hasAns=dec.questions&&dec.questions.some(q=>q.answer);
    if(hasAns){
      const idx=S.letters.sent.findIndex(l=>l.id===dec.id||(l.title===dec.title&&l.questions.length===dec.questions.length));
      if(idx>=0){
        const upd={...S.letters.sent[idx],questions:S.letters.sent[idx].questions.map((q,i)=>({...q,answer:dec.questions[i]?.answer||q.answer||''}))};
        const sent=[...S.letters.sent];sent[idx]=upd;
        S.letters={...S.letters,sent};lsSave();showToast(t('merged'));go('home');return;
      }
    }
    if(S.letters.received.find(l=>l.id===dec.id)){showToast(t('already'));return;}
    const rec={...dec,type:'received',importedAt:Date.now()};
    S.letters={...S.letters,received:[rec,...S.letters.received]};
    lsSave();showToast(t('arrived'));go('home');
  }catch(e){showToast(t('invalid'));}
}

function resetSwipes(){

}

/* ── 스와이프 이벤트 바인딩 ── */
function bindSwipes(){
  document.querySelectorAll('.swipe-wrap').forEach(wrap=>{
    const inner=wrap.querySelector('.swipe-inner');
    if(!inner||inner._bound)return;
    inner._bound=true;
    const onSwipeDone=()=>{
      /* 스와이프 완료 → 바로 확인창 */
      const delBtn=wrap.querySelector('.swipe-del');
      if(delBtn) delBtn.click();
    };
    let startX=0,startY=0,dx=0,swiping=false,locked=false;
    /* 터치 */
    inner.addEventListener('touchstart',e=>{
      startX=e.touches[0].clientX;
      startY=e.touches[0].clientY;
      dx=0;swiping=false;locked=false;
    },{passive:true});
    inner.addEventListener('touchmove',e=>{
      const mx=e.touches[0].clientX-startX;
      const my=e.touches[0].clientY-startY;
      if(!locked){
        if(Math.abs(my)>Math.abs(mx)){swiping=false;locked=true;return;}
        if(Math.abs(mx)>6){swiping=true;locked=true;}
      }
      if(!swiping)return;
      dx=Math.min(0,mx);
      inner.style.transform=`translateX(${Math.max(-72,dx)}px)`;
    },{passive:true});
    inner.addEventListener('touchend',()=>{
      if(!swiping)return;
      if(dx<-50){
        inner.style.transform='translateX(-72px)';
        setTimeout(onSwipeDone,150);
      } else {
        inner.style.transform='';
      }
    });
    /* 마우스 */
    inner.addEventListener('mousedown',e=>{startX=e.clientX;dx=0;swiping=false;locked=false;});
    inner.addEventListener('mousemove',e=>{
      if(e.buttons!==1)return;
      if(!locked){
        if(Math.abs(e.clientX-startX)>6){swiping=true;locked=true;}
      }
      if(!swiping)return;
      dx=Math.min(0,e.clientX-startX);
      inner.style.transform=`translateX(${Math.max(-72,dx)}px)`;
    });
    inner.addEventListener('mouseup',()=>{
      if(!swiping)return;swiping=false;
      if(dx<-50){
        inner.style.transform='translateX(-72px)';
        setTimeout(onSwipeDone,150);
      } else {
        inner.style.transform='';
      }
    });
    inner.addEventListener('mouseleave',()=>{
      if(swiping){swiping=false;inner.style.transform='';}
    });
  });
}

        <button class="btnf" style="flex:1;background:#e24b4a;border:none;" onclick="confirmYes()">${t('delYes')}</button>
      </div>
    </div>
  </div>`;
}
function render(){
  const el=document.getElementById('root');
  let html='';
  if(S.confirm){
    html=lbar()+renderConfirm();
  } else if(S.view==='home')html=renderHome();
  else if(S.view==='inbox')html=renderInbox();
  else if(S.view==='sent-list')html=renderSentList();
  else if(S.view==='import')html=renderImport();
  else if(S.view==='create')html=renderCreate();
  else if(S.view==='view-r')html=renderViewR();
  else if(S.view==='view-s')html=renderViewS();
  el.innerHTML=html;
  el.className='frame'+(lang==='jp'?' jp':lang==='kr'?' kr':'');
  if(S.view==='create'&&!S.confirm)addQ();
  requestAnimationFrame(drawArc);
  if((S.view==='home'||S.view==='inbox'||S.view==='sent-list')&&!S.confirm) setTimeout(bindSwipes,0);
}

lsLoad();obLang=lang;render();showOnboarding();
if(_al)clearInterval(_al);
_al=setInterval(()=>{syncTokens();drawArc();},1000);
</script>

<script>
(function(){
  // manifest inline
  const manifest={
    name:'Slow Letter',short_name:'Slow Letter',
    description:'천천히, 서로에게 스며드는 시간',
    start_url:location.href,
    display:'standalone',
    background_color:'#ffffff',theme_color:'#ffffff',
    orientation:'portrait'
  };
  const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const mUrl=URL.createObjectURL(mBlob);
  const link=document.createElement('link');
  link.rel='manifest';link.href=mUrl;
  document.head.appendChild(link);

  // service worker inline
  if('serviceWorker' in navigator){
    const swCode=`
const CACHE='sl-v1';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{self.clients.claim();});
self.addEventListener('fetch',e=>{
  e.respondWith(
    caches.open(CACHE).then(cache=>
      cache.match(e.request).then(r=>{
        const fetch_=fetch(e.request).then(res=>{
          cache.put(e.request,res.clone());return res;
        }).catch(()=>r);
        return r||fetch_;
      })
    )
  );
});`;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl,{scope:'./'}).catch(()=>{});
  }
})();
</script>
